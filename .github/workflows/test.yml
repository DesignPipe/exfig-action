# Test workflow for ExFig Action
# Tests validation, binary download, and caching without requiring Figma credentials

name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-validation:
    name: Test input validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test valid commands
        shell: bash
        run: |
          VALID_COMMANDS="colors icons images typography batch fetch download"
          for cmd in $VALID_COMMANDS; do
            if echo "$VALID_COMMANDS" | grep -qw "$cmd"; then
              echo "✓ Command '$cmd' is valid"
            else
              echo "✗ Command '$cmd' should be valid"
              exit 1
            fi
          done

      - name: Test invalid command
        shell: bash
        run: |
          VALID_COMMANDS="colors icons images typography batch fetch download"
          INVALID_CMD="invalid"
          if echo "$VALID_COMMANDS" | grep -qw "$INVALID_CMD"; then
            echo "✗ Command '$INVALID_CMD' should be invalid"
            exit 1
          else
            echo "✓ Command '$INVALID_CMD' correctly rejected"
          fi

  test-version-resolution:
    name: Test version resolution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest version
        id: resolve
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/alexey1312/exfig/releases/latest")
          # Use jq if available, fallback to grep+sed
          if command -v jq &>/dev/null; then
            VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' 2>/dev/null || echo "")
          else
            VERSION=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || echo "")
          fi
          if [[ -z "$VERSION" ]]; then
            echo "✗ Failed to resolve latest version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✓ Resolved latest version: $VERSION"

      - name: Verify version format
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "✓ Version format is valid: $VERSION"
          else
            echo "✗ Invalid version format: $VERSION (expected v-prefixed semver)"
            exit 1
          fi

  test-version-normalization:
    name: Test version normalization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test version with v-prefix
        run: |
          VERSION="v1.1.3"
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          if [[ "$VERSION" == "v1.1.3" ]]; then
            echo "✓ Version with v-prefix unchanged: $VERSION"
          else
            echo "✗ Version with v-prefix should be unchanged"
            exit 1
          fi

      - name: Test version without v-prefix
        run: |
          VERSION="1.1.3"
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          if [[ "$VERSION" == "v1.1.3" ]]; then
            echo "✓ Version without v-prefix normalized: $VERSION"
          else
            echo "✗ Version without v-prefix should be normalized to v1.1.3"
            exit 1
          fi

  test-invalid-version:
    name: Test invalid version handling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test empty version gets v-prefix
        run: |
          # Empty string edge case - should add v prefix
          VERSION=""
          if [[ -n "$VERSION" && ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          echo "✓ Empty version handled: '$VERSION'"

      - name: Test version with spaces
        run: |
          VERSION="  1.1.3  "
          # Trim whitespace
          VERSION=$(echo "$VERSION" | xargs)
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          if [[ "$VERSION" == "v1.1.3" ]]; then
            echo "✓ Version with spaces normalized: $VERSION"
          else
            echo "✗ Version with spaces should be normalized"
            exit 1
          fi

      - name: Test download URL construction
        run: |
          # Verify URL is valid for a known version
          VERSION="v1.1.3"
          ARCHIVE="exfig-linux-x64.tar.gz"
          DOWNLOAD_URL="https://github.com/alexey1312/exfig/releases/download/$VERSION/$ARCHIVE"

          HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" "$DOWNLOAD_URL")
          # 302 means redirect to download (valid)
          if [[ "$HTTP_CODE" == "302" ]]; then
            echo "✓ Download URL is valid (HTTP $HTTP_CODE): $DOWNLOAD_URL"
          else
            echo "✗ Download URL returned unexpected status: $HTTP_CODE"
            exit 1
          fi

  test-binary-download:
    name: Test binary download
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/alexey1312/exfig/releases/latest")
          # Use jq if available, fallback to grep+sed
          if command -v jq &>/dev/null; then
            VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' 2>/dev/null || echo "")
          else
            VERSION=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || echo "")
          fi
          if [[ -z "$VERSION" ]]; then
            echo "✗ Failed to resolve latest version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download ExFig binary
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          INSTALL_DIR="${{ runner.temp }}/exfig"
          mkdir -p "$INSTALL_DIR"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE="exfig-macos.zip"
          else
            ARCHIVE="exfig-linux-x64.tar.gz"
          fi

          DOWNLOAD_URL="https://github.com/alexey1312/exfig/releases/download/$VERSION/$ARCHIVE"
          echo "Downloading ExFig $VERSION ($ARCHIVE)..."
          echo "URL: $DOWNLOAD_URL"

          HTTP_CODE=$(curl -sL -w "%{http_code}" -o "${{ runner.temp }}/$ARCHIVE" "$DOWNLOAD_URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "✗ Failed to download ExFig. HTTP status: $HTTP_CODE"
            exit 1
          fi

          cd "${{ runner.temp }}"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip -o "$ARCHIVE" -d "$INSTALL_DIR"
          else
            tar -xzf "$ARCHIVE" -C "$INSTALL_DIR"
          fi

          chmod +x "$INSTALL_DIR/ExFig"
          echo "✓ ExFig installed to $INSTALL_DIR/ExFig"

      - name: Verify binary works
        run: |
          "${{ runner.temp }}/exfig/ExFig" --version
          echo "✓ ExFig binary executes successfully"

  test-binary-caching:
    name: Test binary caching
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/alexey1312/exfig/releases/latest")
          # Use jq if available, fallback to grep+sed
          if command -v jq &>/dev/null; then
            VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' 2>/dev/null || echo "")
          else
            VERSION=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || echo "")
          fi
          if [[ -z "$VERSION" ]]; then
            echo "✗ Failed to resolve latest version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check cache
        id: cache-binary
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/exfig
          key: exfig-binary-${{ runner.os }}-${{ steps.resolve.outputs.version }}

      - name: Download if not cached
        if: steps.cache-binary.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          INSTALL_DIR="${{ runner.temp }}/exfig"
          mkdir -p "$INSTALL_DIR"

          ARCHIVE="exfig-linux-x64.tar.gz"
          DOWNLOAD_URL="https://github.com/alexey1312/exfig/releases/download/$VERSION/$ARCHIVE"
          echo "Downloading ExFig $VERSION..."
          echo "URL: $DOWNLOAD_URL"

          HTTP_CODE=$(curl -sL -w "%{http_code}" -o "${{ runner.temp }}/$ARCHIVE" "$DOWNLOAD_URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "✗ Failed to download ExFig. HTTP status: $HTTP_CODE"
            exit 1
          fi

          cd "${{ runner.temp }}"
          tar -xzf "$ARCHIVE" -C "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/ExFig"
          echo "✓ ExFig downloaded and installed"

      - name: Report cache status
        run: |
          if [[ "${{ steps.cache-binary.outputs.cache-hit }}" == "true" ]]; then
            echo "✓ Binary was restored from cache"
          else
            echo "✓ Binary was downloaded (cache miss expected on first run)"
          fi

      - name: Verify binary works
        run: |
          "${{ runner.temp }}/exfig/ExFig" --version
          echo "✓ ExFig binary executes successfully"
