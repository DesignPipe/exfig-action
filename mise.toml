# =============================================================================
# mise Configuration for ExFig Action
# =============================================================================
# Bootstrap Binary Version Management:
# ------------------------------------
# The mise version for this project is embedded in ./bin/mise bootstrap binary.
# NO global mise installation required - ./bin/mise is self-contained!
#
# To update mise version:
#   Option 1 (Recommended): bin/mise self-update
#   Option 2 (Manual regeneration):
#     1. Install new mise temporarily: curl https://mise.run | sh
#     2. Regenerate bootstrap: mise generate bootstrap > ./bin/mise
#     3. Make executable: chmod +x ./bin/mise
# =============================================================================

[settings]
lockfile = false
experimental = true
legacy_version_file = false

# =============================================================================
# Git Hooks (native git mechanism via core.hooksPath)
# =============================================================================
# Hooks are stored in .githooks/ directory (tracked in repo)
# Auto-configures on directory entry via hooks.enter

[hooks.enter]
run = "git config core.hooksPath .githooks 2>/dev/null || true"

# =============================================================================
# Tools
# =============================================================================

[tools]
python = "3.13"
git-cliff = "2.10.1"

# --- Git Hooks & Formatting ---
hk = "1.28.0"     # Git hooks manager
dprint = "0.50.2" # MD formatting (Rust, fast)
pkl = "0.30.2"    # Configuration language (for hk.pkl)

# --- Linting ---
actionlint = "1.7.9" # GitHub Actions linting
yamllint = "1.35.1"  # YAML linting

# =============================================================================
# Tasks
# =============================================================================

[tasks.setup]
description = "Show git hooks status"
run = "echo 'Git hooks:' && git config core.hooksPath && ls -la .githooks/"

[tasks.pre-commit]
description = "Run all pre-commit checks"
run = """
set -o pipefail
hk check --all 2>&1 | grep -E '^(✔|✗|hk )' || true
"""

[tasks.format]
description = "Format all files (Markdown)"
run = "hk fix --all 2>&1 | grep -E '^(✔|✗|hk )' || true"

[tasks.format-check]
description = "Check all formatting (CI)"
run = """
set -o pipefail
hk check --all 2>&1 | grep -E '^(✔|✗|hk )'
"""

[tasks.format-md]
description = "Format markdown files"
run = "dprint fmt"

[tasks.format-md-check]
description = "Check markdown formatting (CI)"
run = "dprint check"

[tasks.lint-yaml]
description = "Lint YAML files"
run = "yamllint -c .yamllint.yaml *.yml *.yaml .github/workflows/*.yml"

[tasks.lint-actions]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.changelog]
description = "Generate CHANGELOG.md from git history"
run = "git-cliff -o CHANGELOG.md"

[tasks."changelog:unreleased"]
description = "Preview unreleased changes"
run = "git-cliff --unreleased"

[tasks.test-parsing]
description = "Test ExFig output parsing logic"
run = "./scripts/test-parsing.sh"
