name: 'ExFig Action'
description: 'Export Figma assets (colors, icons, images, typography) using ExFig CLI'
author: 'Aleksei Kakoulin'
branding:
  icon: 'download'
  color: 'purple'

inputs:
  figma_token:
    description: 'Figma Personal Access Token'
    required: true
  command:
    description: 'ExFig command to run: colors, icons, images, typography, batch, fetch, download'
    required: true
  config:
    description: 'Path to exfig.yml config file'
    required: false
    default: 'exfig.yml'
  filter:
    description: 'Filter pattern for assets (e.g., "icon/*")'
    required: false
  version:
    description: 'ExFig version to use (default: latest)'
    required: false
    default: 'latest'
  cache:
    description: 'Enable caching for incremental exports'
    required: false
    default: 'false'
  cache_path:
    description: 'Path to cache file'
    required: false
    default: '.exfig-cache.json'
  cache_key_prefix:
    description: 'Prefix for cache key'
    required: false
    default: 'exfig-cache'
  granular_cache:
    description: 'Enable experimental granular caching'
    required: false
    default: 'false'
  rate_limit:
    description: 'Figma API rate limit (requests per second)'
    required: false
    default: '10'
  max_retries:
    description: 'Maximum retries for failed API requests'
    required: false
    default: '3'
  output_dir:
    description: 'Output directory for exported assets'
    required: false
  verbose:
    description: 'Enable verbose logging'
    required: false
    default: 'false'
  extra_args:
    description: 'Additional CLI arguments to pass to ExFig (e.g., "--force --dry-run")'
    required: false
    default: ''
  slack_webhook:
    description: 'Slack Incoming Webhook URL for notifications'
    required: false
  slack_mention:
    description: 'User/group to mention on failure (@channel, <@U123>)'
    required: false
    default: ''
  slack_templates:
    description: 'Path to custom Slack templates directory (overrides defaults)'
    required: false
    default: ''

outputs:
  assets_exported:
    description: 'Number of assets exported'
    value: ${{ steps.run-exfig.outputs.assets_exported }}
  changed_files:
    description: 'List of changed files (newline-separated)'
    value: ${{ steps.run-exfig.outputs.changed_files }}
  cache_hit:
    description: 'Whether cache was restored'
    value: ${{ steps.restore-cache.outputs.cache-hit }}
  exit_code:
    description: 'ExFig command exit code (0 = success)'
    value: ${{ steps.run-exfig.outputs.exit_code }}
  failed_count:
    description: 'Number of failed configs in batch mode'
    value: ${{ steps.run-exfig.outputs.failed_count }}
  duration:
    description: 'Execution duration in seconds'
    value: ${{ steps.run-exfig.outputs.duration }}
  config_summary:
    description: 'Summary of config files processed (for batch command)'
    value: ${{ steps.run-exfig.outputs.config_summary }}

runs:
  using: 'composite'
  steps:
    # Step 1: Validate inputs
    - name: Validate inputs
      id: validate
      shell: bash
      run: |
        # Validate command
        VALID_COMMANDS="colors icons images typography batch fetch download"
        if ! echo "$VALID_COMMANDS" | grep -qw "${{ inputs.command }}"; then
          echo "::error::Invalid command '${{ inputs.command }}'. Valid commands: $VALID_COMMANDS"
          exit 1
        fi

        # Validate platform
        if [[ "${{ runner.os }}" != "Linux" && "${{ runner.os }}" != "macOS" ]]; then
          echo "::error::Unsupported platform: ${{ runner.os }}. Only Linux and macOS are supported."
          exit 1
        fi

        echo "platform=${{ runner.os }}" >> $GITHUB_OUTPUT

    # Step 2: Resolve version
    - name: Resolve ExFig version
      id: resolve-version
      shell: bash
      run: |
        if [[ "${{ inputs.version }}" == "latest" ]]; then
          RESPONSE=$(curl -sL "https://api.github.com/repos/alexey1312/exfig/releases/latest")
          # Use jq if available, fallback to grep+sed for environments without jq
          if command -v jq &>/dev/null; then
            VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' 2>/dev/null || echo "")
          else
            VERSION=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || echo "")
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Failed to fetch latest ExFig version. This may happen due to GitHub API rate limiting."
            exit 1
          fi
        else
          VERSION="${{ inputs.version }}"
          # Normalize version: add 'v' prefix if missing (ExFig tags use v-prefix)
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Resolved ExFig version: $VERSION"

    # Step 3: Cache ExFig binary
    - name: Cache ExFig binary
      id: cache-binary
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/exfig
        key: exfig-binary-${{ runner.os }}-${{ steps.resolve-version.outputs.version }}

    # Step 4: Download ExFig binary
    - name: Download ExFig binary
      if: steps.cache-binary.outputs.cache-hit != 'true'
      shell: bash
      run: |
        VERSION="${{ steps.resolve-version.outputs.version }}"
        INSTALL_DIR="${{ runner.temp }}/exfig"
        mkdir -p "$INSTALL_DIR"

        if [[ "${{ runner.os }}" == "macOS" ]]; then
          ARCHIVE="exfig-macos.zip"
        else
          ARCHIVE="exfig-linux-x64.tar.gz"
        fi

        DOWNLOAD_URL="https://github.com/alexey1312/exfig/releases/download/$VERSION/$ARCHIVE"
        echo "Downloading ExFig $VERSION ($ARCHIVE)..."
        echo "URL: $DOWNLOAD_URL"

        HTTP_CODE=$(curl -sL -w "%{http_code}" -o "${{ runner.temp }}/$ARCHIVE" "$DOWNLOAD_URL")
        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "::error::Failed to download ExFig. HTTP status: $HTTP_CODE"
          echo "::error::URL: $DOWNLOAD_URL"
          exit 1
        fi

        # Extract
        cd "${{ runner.temp }}"
        if [[ "$ARCHIVE" == *.zip ]]; then
          unzip -o "$ARCHIVE" -d "$INSTALL_DIR"
        else
          tar -xzf "$ARCHIVE" -C "$INSTALL_DIR"
        fi

        # Make executable (binary is named ExFig with capital letters)
        chmod +x "$INSTALL_DIR/ExFig"
        echo "ExFig installed to $INSTALL_DIR/ExFig"

    # Step 5: Add ExFig to PATH
    - name: Add ExFig to PATH
      shell: bash
      run: |
        echo "${{ runner.temp }}/exfig" >> $GITHUB_PATH

    # Step 6: Restore cache (if caching enabled)
    - name: Restore ExFig cache
      id: restore-cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.cache_path }}
        key: ${{ inputs.cache_key_prefix }}-${{ github.run_id }}
        restore-keys: |
          ${{ inputs.cache_key_prefix }}-

    # Step 7: Run ExFig command
    - name: Run ExFig
      id: run-exfig
      shell: bash
      env:
        FIGMA_PERSONAL_TOKEN: ${{ inputs.figma_token }}
      run: |
        # Track execution time
        START_TIME=$(date +%s)

        # Build command
        CMD="ExFig ${{ inputs.command }}"

        # Handle config based on command type
        # For 'batch' command: paths are positional arguments (added at the end)
        # For other commands: use --config flag
        CONFIG_PATHS=()
        if [[ "${{ inputs.command }}" == "batch" ]]; then
          # Parse comma-separated paths, handling spaces correctly
          IFS=',' read -ra CONFIGS <<< "${{ inputs.config }}"
          for cfg in "${CONFIGS[@]}"; do
            # Trim leading/trailing whitespace
            cfg=$(echo "$cfg" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [[ -f "$cfg" ]]; then
              CONFIG_PATHS+=("$cfg")
            else
              echo "::warning::Config file not found: $cfg"
            fi
          done
          if [[ ${#CONFIG_PATHS[@]} -eq 0 ]]; then
            echo "::error::No valid config files found for batch command"
            exit 1
          fi
          # Create config summary (just filenames for batch command)
          CONFIG_SUMMARY=$(printf '%s\n' "${CONFIG_PATHS[@]}" | xargs -n1 basename | tr '\n' ', ' | sed 's/,$//')
        elif [[ -f "${{ inputs.config }}" ]]; then
          CONFIG_SUMMARY=""
          CMD="$CMD -i \"${{ inputs.config }}\""
        else
          CONFIG_SUMMARY=""
        fi

        # Add filter if provided
        if [[ -n "${{ inputs.filter }}" ]]; then
          CMD="$CMD \"${{ inputs.filter }}\""
        fi

        # Add cache flag
        if [[ "${{ inputs.cache }}" == "true" ]]; then
          CMD="$CMD --cache"
          CMD="$CMD --cache-path ${{ inputs.cache_path }}"
        fi

        # Add granular cache flag
        if [[ "${{ inputs.granular_cache }}" == "true" ]]; then
          CMD="$CMD --experimental-granular-cache"
        fi

        # Add rate limit
        CMD="$CMD --rate-limit ${{ inputs.rate_limit }}"

        # Add max retries
        CMD="$CMD --max-retries ${{ inputs.max_retries }}"

        # Add output directory if provided
        if [[ -n "${{ inputs.output_dir }}" ]]; then
          CMD="$CMD --output ${{ inputs.output_dir }}"
        fi

        # Add verbose flag
        if [[ "${{ inputs.verbose }}" == "true" ]]; then
          CMD="$CMD --verbose"
        fi

        # Add config paths at the end for batch command (positional arguments)
        if [[ ${#CONFIG_PATHS[@]} -gt 0 ]]; then
          for cfg in "${CONFIG_PATHS[@]}"; do
            CMD="$CMD \"$cfg\""
          done
        fi

        # Add extra arguments if provided
        if [[ -n "${{ inputs.extra_args }}" ]]; then
          CMD="$CMD ${{ inputs.extra_args }}"
        fi

        echo "Running: $CMD"

        # Capture output for parsing
        OUTPUT_FILE="${{ runner.temp }}/exfig-output.txt"
        eval $CMD 2>&1 | tee "$OUTPUT_FILE"
        EXIT_CODE=${PIPESTATUS[0]}

        # Calculate duration
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "duration=${DURATION}s" >> $GITHUB_OUTPUT

        # ALWAYS set outputs before potential exit (for Slack notifications)
        # Parse output for metrics - match ExFig output: "✓ config.yaml - N colors/icons"
        ASSETS_COUNT=$(grep -E '^✓.*- [0-9]+ ' "$OUTPUT_FILE" 2>/dev/null \
          | grep -oE '[0-9]+' | awk '{sum+=$1} END {print sum+0}')
        echo "assets_exported=$ASSETS_COUNT" >> $GITHUB_OUTPUT

        # Parse failure count from batch output: "Batch complete: X succeeded, Y failed"
        FAILED_COUNT=$(grep -oE '[0-9]+ failed' "$OUTPUT_FILE" 2>/dev/null | grep -oE '[0-9]+' | head -1 || echo "0")
        if [[ -z "$FAILED_COUNT" ]]; then
          FAILED_COUNT="0"
        fi
        echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT

        # Override exit code if ExFig reported failures but returned 0
        if [[ "$FAILED_COUNT" -gt 0 && "$EXIT_CODE" -eq 0 ]]; then
          echo "::warning::ExFig reported $FAILED_COUNT failure(s) but returned exit code 0"
          EXIT_CODE=1
        fi

        # Output config summary
        echo "config_summary=$CONFIG_SUMMARY" >> $GITHUB_OUTPUT

        # ALWAYS set changed_files (empty if none)
        if git rev-parse --git-dir > /dev/null 2>&1; then
          CHANGED=$(git diff --name-only 2>/dev/null || echo "")
        else
          CHANGED=""
        fi
        echo "changed_files<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGED" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Save exit code for Slack notification step
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Exit with original code AFTER setting outputs
        if [[ $EXIT_CODE -ne 0 ]]; then
          echo "::error::ExFig command failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    # Step 8: Save cache (always, even on failure for checkpoint resume)
    - name: Save ExFig cache
      if: always() && inputs.cache == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.cache_path }}
        key: ${{ inputs.cache_key_prefix }}-${{ github.run_id }}

    # Step 9: Send Slack notification
    - name: Send Slack notification
      if: always() && inputs.slack_webhook != ''
      shell: bash
      env:
        SLACK_WEBHOOK: ${{ inputs.slack_webhook }}
        SLACK_MENTION: ${{ inputs.slack_mention }}
        SLACK_TEMPLATES: ${{ inputs.slack_templates }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Use exit_code from run-exfig (more reliable than job.status)
        EXIT_CODE="${{ steps.run-exfig.outputs.exit_code }}"
        EXIT_CODE="${EXIT_CODE:-1}"  # default to failure if not set

        COMMAND="${{ inputs.command }}"
        CONFIG_SUMMARY="${{ steps.run-exfig.outputs.config_summary }}"
        ASSETS="${{ steps.run-exfig.outputs.assets_exported }}"
        ASSETS="${ASSETS:-0}"  # default to 0 if not set
        FAILED_COUNT="${{ steps.run-exfig.outputs.failed_count }}"
        FAILED_COUNT="${FAILED_COUNT:-0}"
        DURATION="${{ steps.run-exfig.outputs.duration }}"
        DURATION="${DURATION:-0s}"
        CACHE_HIT="${{ steps.restore-cache.outputs.cache-hit }}"
        CACHE_ENABLED="${{ inputs.cache }}"
        REPO="${{ github.repository }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        # Build command display with config details for batch
        if [[ -n "$CONFIG_SUMMARY" ]]; then
          COMMAND_DISPLAY="$COMMAND ($CONFIG_SUMMARY)"
        else
          COMMAND_DISPLAY="$COMMAND"
        fi

        # Determine status, icon, template, and context based on result
        SUBTITLE=""
        TEMPLATE_NAME=""
        if [[ "$EXIT_CODE" == "0" ]]; then
          # Check for cache hit with no changes
          if [[ "$CACHE_ENABLED" == "true" && "$CACHE_HIT" == "true" && "$ASSETS" == "0" ]]; then
            COLOR="#36a64f"
            ICON="💨"
            TITLE="No changes detected"
            SUBTITLE="Cache hit - all assets up to date"
            TEMPLATE_NAME="cache-hit.json"
          else
            COLOR="#36a64f"
            ICON="✅"
            TITLE="Export completed"
            TEMPLATE_NAME="success.json"
          fi
        else
          COLOR="#dc3545"
          ICON="❌"
          TITLE="Export failed"
          TEMPLATE_NAME="failure.json"
          if [[ "$FAILED_COUNT" -gt 0 ]]; then
            SUBTITLE="$FAILED_COUNT config(s) failed"
          fi
          if [[ -n "$SLACK_MENTION" ]]; then
            TITLE="$TITLE $SLACK_MENTION"
          fi
        fi

        # Resolve template path (user override or default)
        TEMPLATE_FILE=""
        if [[ -n "$SLACK_TEMPLATES" && -f "$SLACK_TEMPLATES/$TEMPLATE_NAME" ]]; then
          TEMPLATE_FILE="$SLACK_TEMPLATES/$TEMPLATE_NAME"
          echo "Using custom template: $TEMPLATE_FILE"
        elif [[ -f "$ACTION_PATH/templates/slack/$TEMPLATE_NAME" ]]; then
          TEMPLATE_FILE="$ACTION_PATH/templates/slack/$TEMPLATE_NAME"
        fi

        # Build payload from template or inline
        if [[ -n "$TEMPLATE_FILE" ]] && command -v sed &>/dev/null; then
          # Load template and substitute variables
          PAYLOAD=$(cat "$TEMPLATE_FILE" | sed \
            -e "s|{{COLOR}}|$COLOR|g" \
            -e "s|{{ICON}}|$ICON|g" \
            -e "s|{{TITLE}}|$TITLE|g" \
            -e "s|{{COMMAND}}|$COMMAND_DISPLAY|g" \
            -e "s|{{ASSETS}}|$ASSETS|g" \
            -e "s|{{DURATION}}|$DURATION|g" \
            -e "s|{{REPO}}|$REPO|g" \
            -e "s|{{SUBTITLE}}|$SUBTITLE|g" \
            -e "s|{{RUN_URL}}|$RUN_URL|g")
        elif command -v jq &>/dev/null; then
          # Fallback to inline jq generation
          if [[ -n "$SUBTITLE" ]]; then
            PAYLOAD=$(jq -n \
              --arg color "$COLOR" \
              --arg icon "$ICON" \
              --arg title "$TITLE" \
              --arg command "$COMMAND_DISPLAY" \
              --arg assets "$ASSETS" \
              --arg repo "$REPO" \
              --arg duration "$DURATION" \
              --arg subtitle "$SUBTITLE" \
              --arg url "$RUN_URL" \
              '{
                attachments: [{
                  color: $color,
                  blocks: [
                    {type: "header", text: {type: "plain_text", text: "\($icon) ExFig: \($title)", emoji: true}},
                    {type: "section", fields: [
                      {type: "mrkdwn", text: "*Command:*\n`\($command)`"},
                      {type: "mrkdwn", text: "*Assets:*\n\($assets) exported"}
                    ]},
                    {type: "section", fields: [
                      {type: "mrkdwn", text: "*Repository:*\n\($repo)"},
                      {type: "mrkdwn", text: "*Duration:*\n\($duration)"}
                    ]},
                    {type: "context", elements: [{type: "mrkdwn", text: "\($subtitle)"}]},
                    {type: "actions", elements: [
                      {type: "button", text: {type: "plain_text", text: "View Run", emoji: true}, url: $url}
                    ]}
                  ]
                }]
              }')
          else
            PAYLOAD=$(jq -n \
              --arg color "$COLOR" \
              --arg icon "$ICON" \
              --arg title "$TITLE" \
              --arg command "$COMMAND_DISPLAY" \
              --arg assets "$ASSETS" \
              --arg repo "$REPO" \
              --arg duration "$DURATION" \
              --arg url "$RUN_URL" \
              '{
                attachments: [{
                  color: $color,
                  blocks: [
                    {type: "header", text: {type: "plain_text", text: "\($icon) ExFig: \($title)", emoji: true}},
                    {type: "section", fields: [
                      {type: "mrkdwn", text: "*Command:*\n`\($command)`"},
                      {type: "mrkdwn", text: "*Assets:*\n\($assets) exported"}
                    ]},
                    {type: "section", fields: [
                      {type: "mrkdwn", text: "*Repository:*\n\($repo)"},
                      {type: "mrkdwn", text: "*Duration:*\n\($duration)"}
                    ]},
                    {type: "actions", elements: [
                      {type: "button", text: {type: "plain_text", text: "View Run", emoji: true}, url: $url}
                    ]}
                  ]
                }]
              }')
          fi
        else
          # Simple fallback without jq or templates
          MSG="$ICON ExFig: $TITLE\\n"
          MSG+="Command: $COMMAND_DISPLAY\\n"
          MSG+="Assets: $ASSETS exported\\n"
          MSG+="Duration: $DURATION\\n"
          MSG+="Repository: $REPO\\n"
          MSG+="<$RUN_URL|View Run>"
          PAYLOAD="{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$MSG\"}]}"
        fi

        # Send with error handling
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST -H 'Content-type: application/json' \
          --data "$PAYLOAD" "$SLACK_WEBHOOK")

        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "::warning::Slack notification failed with HTTP $HTTP_CODE"
        else
          echo "Slack notification sent successfully"
        fi
